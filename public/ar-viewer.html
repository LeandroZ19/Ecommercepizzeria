<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RapiPizza AR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<style>
:root{--ember:#ff5a36;--char:#1b1410;--cream:#f7efe3;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--char);font-family:'Poppins',sans-serif;}
a-scene{position:absolute;inset:0;}
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;}
#topBar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:linear-gradient(to bottom,rgba(27,20,16,.85),transparent);pointer-events:auto;}
#brand{display:flex;align-items:center;gap:8px;font-family:'Fredoka',sans-serif;font-weight:600;color:var(--cream);font-size:18px;}
#brand b{color:var(--ember);}
#backBtn{background:rgba(27,20,16,0.7);color:var(--cream);border:1px solid rgba(255,90,54,.4);border-radius:999px;font-family:'Poppins',sans-serif;font-size:13px;padding:7px 16px;cursor:pointer;}
#instructions{margin:auto 16px 80px;background:rgba(27,20,16,.82);border:1px solid rgba(255,90,54,.35);border-radius:16px;padding:16px 20px;backdrop-filter:blur(6px);pointer-events:none;text-align:center;}
#instructions h2{font-family:'Fredoka',sans-serif;font-size:18px;color:var(--ember);margin-bottom:6px;}
#instructions p{font-size:13px;color:rgba(247,239,227,.8);line-height:1.5;}
#instructions .steps{display:flex;flex-direction:column;gap:8px;margin-top:12px;text-align:left;}
#instructions .step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--cream);}
#instructions .num{width:24px;height:24px;border-radius:50%;background:var(--ember);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-size:13px;flex-shrink:0;}
#pdName{margin:16px auto 0;font-family:'Fredoka',sans-serif;font-weight:600;color:var(--cream);font-size:22px;text-align:center;text-shadow:0 2px 12px rgba(0,0,0,.6);pointer-events:none;}
</style>
</head>
<body>
<a-scene embedded arjs="sourceType:webcam;debugUIEnabled:false;detectionMode:mono_and_matrix;matrixCodeType:3x3;" vr-mode-ui="enabled:false" renderer="logarithmicDepthBuffer:true;antialias:true" id="arScene">
  <a-marker preset="hiro" id="hirolMarker">
    <a-entity id="pizzaModel" position="0 0.05 0" rotation="-90 0 0" scale="0.8 0.8 0.8">
      <a-cylinder radius="0.55" height="0.06" color="#e8c87a" material="roughness:0.9" position="0 0 0"></a-cylinder>
      <a-torus radius="0.52" radius-tubular="0.06" color="#d4a832" material="roughness:0.8" rotation="90 0 0" position="0 0.02 0"></a-torus>
      <a-cylinder radius="0.44" height="0.015" color="#c81d25" material="roughness:0.6" position="0 0.04 0"></a-cylinder>
      <a-cylinder radius="0.36" height="0.012" color="#f5e6a0" material="roughness:0.5" position="0 0.055 0"></a-cylinder>
      <a-sphere radius="0.12" color="#f5e6a0" material="roughness:0.5" position="0.18 0.05 0.12" scale="1 0.2 1"></a-sphere>
      <a-sphere radius="0.10" color="#f5e6a0" material="roughness:0.5" position="-0.22 0.05 0.05" scale="1 0.2 1"></a-sphere>
      <a-sphere radius="0.09" color="#f5e6a0" material="roughness:0.5" position="0.08 0.05 -0.25" scale="1 0.2 1"></a-sphere>
      <a-cylinder radius="0.07" height="0.02" color="#9c2510" material="roughness:0.7" position="0.22 0.068 0.00"></a-cylinder>
      <a-cylinder radius="0.07" height="0.02" color="#9c2510" material="roughness:0.7" position="-0.22 0.068 0.00"></a-cylinder>
      <a-cylinder radius="0.07" height="0.02" color="#9c2510" material="roughness:0.7" position="0.00 0.068 0.22"></a-cylinder>
      <a-cylinder radius="0.07" height="0.02" color="#9c2510" material="roughness:0.7" position="0.00 0.068 -0.22"></a-cylinder>
      <a-cylinder radius="0.06" height="0.02" color="#9c2510" material="roughness:0.7" position="0.16 0.068 0.16"></a-cylinder>
      <a-cylinder radius="0.06" height="0.02" color="#9c2510" material="roughness:0.7" position="-0.16 0.068 0.16"></a-cylinder>
      <a-cylinder radius="0.06" height="0.02" color="#9c2510" material="roughness:0.7" position="-0.16 0.068 -0.16"></a-cylinder>
      <a-sphere radius="0.04" color="#ffffff" material="opacity:0.25;transparent:true" position="0 0.15 0" animation="property:position;from:0 0.10 0;to:0 0.35 0;dir:normal;dur:2000;loop:true;easing:easeInOutSine"></a-sphere>
      <a-box width="1.25" height="0.06" depth="1.25" color="#e3c98a" material="roughness:0.8" position="0 -0.06 0"></a-box>
      <a-box width="1.25" height="0.06" depth="1.25" color="#d4b870" material="roughness:0.8" position="0 0.06 -0.55" rotation="-70 0 0"></a-box>
      <a-text value="RapiPizza" align="center" color="#c81d25" font="exo2bold" width="2.5" position="0 0.01 0.55" rotation="90 0 0"></a-text>
    </a-entity>
    <a-entity light="type:point;color:#ffcf6b;intensity:1.2;distance:3" position="0 0.8 0"></a-entity>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>
<div id="hud">
  <div id="topBar">
    <div id="brand">Rapi<b>Pizza</b> AR</div>
    <button id="backBtn" onclick="history.back()">&#8592; Volver</button>
  </div>
  <div id="pdName">&#127829; Pizza en Realidad Aumentada</div>
  <div id="instructions">
    <h2>Cómo ver tu pizza en AR</h2>
    <p>Imprime o muestra el marcador Hiro en pantalla y apunta tu cámara hacia él.</p>
    <div class="steps">
      <div class="step"><div class="num">1</div><span>Busca "Hiro marker AR.js" en Google e imprímelo</span></div>
      <div class="step"><div class="num">2</div><span>Apunta la cámara de tu celular al marcador</span></div>
      <div class="step"><div class="num">3</div><span>La pizza aparecerá sobre la mesa en 3D &#127829;</span></div>
    </div>
  </div>
</div>
<script>
const params=new URLSearchParams(location.search);
const pName=params.get('product');
if(pName){document.getElementById('pdName').textContent='&#127829; '+decodeURIComponent(pName)+' en AR';document.title='RapiPizza AR — '+decodeURIComponent(pName);}
let deg=0;
setInterval(()=>{deg=(deg+0.5)%360;const p=document.getElementById('pizzaModel');if(p)p.setAttribute('rotation','-90 '+deg+' 0');},40);
</script>
</body>
</html>
